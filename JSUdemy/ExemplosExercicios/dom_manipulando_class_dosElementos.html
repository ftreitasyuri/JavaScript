<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM_manipulando_estilos_elementos</title>
</head>

<style>
    .classe1{
        background-color: red;
        height: 100px;
        width: 100px;
        color: #FFF;
        text-align: center;
        font-size: 1.4em;
    }

    .classe2{
        background-color: blue;
        height: 100px;
        width: 100px;
        color: #FFF;
        text-align: center;
        font-size: 1.4em;
    }
</style>

<script>
    function aplicarClasse(){
        
        // document.getElementById('quadrado').style.backgroundColor = corDeFundo
        document.getElementById('mudandoClasse').className = 'classe2'
    }
</script>
<body>

    <div class="classe1" id="mudandoClasse">Modificando a classe dos Elementos</div>
    <hr>
    <button type="button" onclick="aplicarClasse()">Aplicar Classe</button>
    
    </body>
</html>
