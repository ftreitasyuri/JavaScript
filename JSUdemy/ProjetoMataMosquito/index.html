<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="jogo.js"> </script>
    <title>Selecionando niveis</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="estilo.css">

    <script>
        function IniciarJogo(){
            var nivel = document.getElementById('nivelSelect').value
            // alert(nivel)

            if(nivel == ""){
                alert('Selecione um nível')
                return false
            }
            window.location.href = 'app.html?' + nivel

        }
    </script>

</head>

<body>


    <div class="container">
        <div class="row">
            <div class="col">
                <div class="d-flex justify-content-center">
                    <img src="imagens/game.png" alt="">
                </div>
            </div>

        </div>


        <div class="row">
            <div class="col">
                <div class="d-flex justify-content-center">
                    <div class="mb-2">
                        <select id="nivelSelect" class="form-control">
                            <option value="">-- Selecione o nível</option>
                            <option value="normal">-- Normal --</option>
                            <option value="dificil">-- Difícil --</option>
                            <option value="chuck">-- ChuckNorris --</option>


                        </select>
                    </div>

                </div>
            </div>
        </div>


        <div class="row">
            <div class="col">
                <div class="d-flex justify-content-center">
                    <button onclick="IniciarJogo()" type="button" class="btn btn-danger btn-lg">Iniciar o nivel</button>
                </div>
            </div>

        </div>
    </div>

    <script></script>
</body>

</html>
